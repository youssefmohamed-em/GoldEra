<div class="bg-black overflow-hidden min-h-screen flex items-center justify-center p-4">

  <!-- Animated Background -->
  <div class="absolute inset-0 z-0 pointer-events-none">
    <svg class="w-full h-full" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
      <!-- Lines -->
      <g stroke="#facc15" stroke-width="1" opacity="0.3">
        <line x1="10%" y1="20%" x2="80%" y2="10%">
          <animate attributeName="x2" values="80%;70%;80%" dur="8s" repeatCount="indefinite" />
        </line>

        <line x1="5%" y1="50%" x2="70%" y2="70%">
          <animate attributeName="y2" values="70%;80%;70%" dur="10s" repeatCount="indefinite" />
        </line>

        <line x1="20%" y1="85%" x2="95%" y2="60%">
          <animate attributeName="y2" values="60%;70%;60%" dur="7s" repeatCount="indefinite" />
        </line>

        <line x1="85%" y1="15%" x2="50%" y2="90%">
          <animate attributeName="x2" values="50%;45%;50%" dur="9s" repeatCount="indefinite" />
        </line>

        <line x1="15%" y1="30%" x2="90%" y2="80%">
          <animate attributeName="x1" values="15%;20%;15%" dur="11s" repeatCount="indefinite" />
        </line>
      </g>

      <!-- Dots -->
      <g fill="#facc15" opacity="0.6">
        <circle cx="15%" cy="25%" r="2">
          <animate attributeName="cy" values="25%;30%;25%" dur="5s" repeatCount="indefinite"/>
        </circle>

        <circle cx="70%" cy="65%" r="2.5">
          <animate attributeName="cy" values="65%;72%;65%" dur="7s" repeatCount="indefinite"/>
        </circle>

        <circle cx="50%" cy="15%" r="2">
          <animate attributeName="cy" values="15%;22%;15%" dur="6s" repeatCount="indefinite"/>
        </circle>

        <circle cx="90%" cy="40%" r="1.5">
          <animate attributeName="cy" values="40%;48%;40%" dur="8s" repeatCount="indefinite"/>
        </circle>

        <circle cx="25%" cy="75%" r="2">
          <animate attributeName="cy" values="75%;82%;75%" dur="9s" repeatCount="indefinite"/>
        </circle>

        <circle cx="80%" cy="20%" r="1.5">
          <animate attributeName="cy" values="20%;28%;20%" dur="10s" repeatCount="indefinite"/>
        </circle>

        <circle cx="10%" cy="60%" r="2">
          <animate attributeName="cy" values="60%;68%;60%" dur="7.5s" repeatCount="indefinite"/>
        </circle>

        <circle cx="60%" cy="85%" r="1.5">
          <animate attributeName="cy" values="85%;92%;85%" dur="8.5s" repeatCount="indefinite"/>
        </circle>
      </g>
    </svg>
  </div>

  <!-- Container -->
  <div class="relative z-10 w-full max-w-5xl rounded-2xl overflow-hidden shadow-2xl flex flex-col md:flex-row">

    <!-- LEFT SIDE - Gold Section -->
    <div class="hidden md:flex w-full md:w-1/2 bg-gradient-to-br from-yellow-500 via-yellow-600 to-yellow-700 text-white p-10 flex-col justify-center items-center text-center">
      <h2 class="text-4xl font-bold mb-4">Welcome Back!</h2>
      <p class="text-sm opacity-90 mb-6">
        Sign in to continue your gold trading journey with us.
      </p>

      <button class="border border-white px-6 py-2 rounded-full hover:bg-white hover:text-yellow-600 transition duration-300 transform hover:-translate-y-0.5" routerLink="/register">
        CREATE ACCOUNT
      </button>
    </div>

    <!-- RIGHT SIDE - White Section -->
    <div class="w-full md:w-1/2 bg-white p-10">

      <!-- Back Link -->
      <a routerLink="/home" class="text-sm text-yellow-500 mb-6 inline-block hover:underline transition">
        ← Back to Home
      </a>

      <!-- Title -->
      <h2 class="text-3xl font-bold text-yellow-500 mb-6">Sign In</h2>

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">

        <!-- Email -->
        <input 
          type="text"
          formControlName="username"
          placeholder="Email or Phone"
          class="w-full px-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-transparent transition"
        />

        <!-- Password -->
        <div class="relative">
          <input 
            [type]="showPwd() ? 'text' : 'password'"
            formControlName="password"
            placeholder="Password"
            class="w-full px-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-transparent transition"
          />

          <button 
            type="button"
            (click)="togglePassword()"
            class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-yellow-500 transition"
          >
            {{ showPwd() ? '🙈' : '👁' }}
          </button>
        </div>

        <!-- Error Message -->
        @if (errorMsg()) {
          <p class="text-red-500 text-sm transition-all duration-300">
            {{ errorMsg() }}
          </p>
        }

        <!-- Submit Button -->
        <button 
          type="submit"
          [disabled]="loading()"
          class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-semibold py-3 rounded-full transition duration-300 transform hover:-translate-y-0.5 disabled:opacity-60 disabled:cursor-not-allowed"
        >
          {{ loading() ? 'Loading...' : 'SIGN IN' }}
        </button>

        <!-- Forgot Password -->
        <p class="text-center text-sm text-gray-400 mt-2 cursor-pointer hover:underline transition">
          Forgot your password?
        </p>

      </form>
    </div>

  </div>

</div>
