<div class="bg-black overflow-hidden min-h-screen flex items-center justify-center p-4">

  <!-- Animated Background -->
  <div class="absolute inset-0 z-0 pointer-events-none">
    <!-- (نفس الـ SVG اللي عندك في login) -->
  </div>

  <!-- Container -->
  <div class="relative z-10 w-full max-w-5xl rounded-2xl overflow-hidden shadow-2xl flex flex-col md:flex-row">

    <!-- LEFT SIDE - Gold Section -->
    <div class="hidden md:flex w-full md:w-1/2 bg-gradient-to-br from-yellow-500 via-yellow-600 to-yellow-700 text-white p-10 flex-col justify-center items-center text-center">

      <h2 class="text-4xl font-bold mb-4">Join Us!</h2>

      <p class="text-sm opacity-90 mb-6">
        Create your account and start your journey with gold trading.
      </p>

      <button
        routerLink="/login"
        class="border border-white px-6 py-2 rounded-full hover:bg-white hover:text-yellow-600 transition duration-300 transform hover:-translate-y-0.5"
      >
        SIGN IN
      </button>

    </div>

    <!-- RIGHT SIDE - White Section -->
    <div class="w-full md:w-1/2 bg-white p-10">

      <!-- Back Link -->
      <a routerLink="/home" class="text-sm text-yellow-500 mb-6 inline-block hover:underline transition">
        ← Back to Home
      </a>

      <!-- Title -->
      <h2 class="text-3xl font-bold text-yellow-500 mb-6">Register</h2>

      <!-- Form -->
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">

        <!-- First Name -->
        <div>
          <label class="text-sm text-yellow-500 font-semibold">First Name</label>
          <input
            type="text"
            formControlName="firstName"
            placeholder=" "
            class="w-full px-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-400"
          />
        </div>

        <!-- Last Name -->
        <div>
          <label class="text-sm text-yellow-500 font-semibold">Last Name</label>
          <input
            type="text"
            formControlName="lastName"
            placeholder=" "
            class="w-full px-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-400"
          />
        </div>

        <!-- Email -->
        <div>
          <label class="text-sm text-yellow-500 font-semibold">Email</label>
          <input
            type="email"
            formControlName="email"
            placeholder=" "
            class="w-full px-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-400"
          />
        </div>

        <!-- Phone -->
        <div>
          <label class="text-sm text-yellow-500 font-semibold">Phone</label>
          <input
            type="text"
            formControlName="phone"
            placeholder=" "
            class="w-full px-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-400"
          />
        </div>

        <!-- Date of Birth -->
        <div>
          <label class="text-sm text-yellow-500 font-semibold">Date of Birth</label>
          <input
            type="date"
            formControlName="dateOfBirth"
            class="w-full px-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-400"
          />
        </div>

        <!-- Nationality -->
        <div>
          <label class="text-sm text-yellow-500 font-semibold">Nationality</label>
          <input
            type="text"
            formControlName="nationality"
            placeholder=" "
            class="w-full px-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-400"
          />
        </div>

        <!-- Password -->
        <div class="relative">
          <label class="text-sm text-yellow-500 font-semibold">Password</label>
          <input
            [type]="showPwd() ? 'text' : 'password'"
            formControlName="password"
            placeholder=" "
            class="w-full px-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-400"
          />

          <button
            type="button"
            (click)="togglePassword()"
            class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-yellow-500 transition"
          >
            {{ showPwd() ? '🙈' : '👁' }}
          </button>
        </div>

        <!-- Error -->
        @if (errorMsg()) {
          <p class="text-red-500 text-sm">
            {{ errorMsg() }}
          </p>
        }

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="loading()"
          class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-semibold py-3 rounded-full transition duration-300 transform hover:-translate-y-0.5 disabled:opacity-60 disabled:cursor-not-allowed"
        >
          {{ loading() ? 'Loading...' : 'REGISTER' }}
        </button>

      </form>

    </div>

  </div>

</div>
